<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Festival Tënkui 2026</title>
    <script>
      // SPA redirect for GitHub Pages
      // Stores the full path in sessionStorage and redirects to the root.
      // The main index.html will pick it up and navigate to the correct route.
      var pathSegmentsToKeep = 1; // number of path segments for the repo name: /tenkuifestivalslp/
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
